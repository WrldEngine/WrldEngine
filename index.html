<!DOCTYPE html>
<html>
    <head>
        <title>ᗪᗩᖇKSOᑌᖇᑕE ᗪS</title>
    </head>
    <body>
        <center>
            <h1>DarkSource</h1>
        <form action="https://github.com/search" target="_blank">
            <input id="search" type="text" placeholder="Enter to want you search..." name="q">
            <input id="butt" type="submit" value="search">
        </form>
        </center>
        <input type="color", name="color", id="color">
        <style>
            body {
                background-color: rgb(0, 0, 0);
            }
            h1 {
                font-size: 90px;
                font-family: Humnst777 Blk Bt;
                color:black;
                background: #8E0E00;  /* fallback for old browsers */
                background: -webkit-linear-gradient(to right, #1F1C18, #8E0E00);  /* Chrome 10-25, Safari 5.1-6 */
                background: linear-gradient(to right, #1F1C18, #8E0E00); /* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */
            }
            h1:hover {
                background: #de6161;  /* fallback for old browsers */
                background: -webkit-linear-gradient(to right, #2657eb, #de6161);  /* Chrome 10-25, Safari 5.1-6 */
                background: linear-gradient(to right, #2657eb, #de6161); /* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */
            } 
            #search {
                display: block;
                border: none;
                background: rgba(255, 255, 255, .5);
                border-radius: 10px;
                padding: 20px;
                color: white;
                outline: none;
                width: 800px;
                font-size: 30px;
            }
            #search::placeholder {
                color: rgb(221, 196, 146);
            }
            #butt {
                font-family: Humnst777 Blk Bt;
                background: #EB5757;  /* fallback for old browsers */
                background: -webkit-linear-gradient(to right, #000000, #EB5757);  /* Chrome 10-25, Safari 5.1-6 */
                background: linear-gradient(to right, #000000, #EB5757); /* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */
                border-radius: 100px;
                padding: 30px;
                color: black;
                outline: none;
                font-size: 30px;
                -webkit-transition: all 0.8s cubic-bezier(0.0, 0.0, 0.0, 0);
                transition: all 0.8s cubic-bezier(0.0, 0.0, 0.0, 0);
            }
            #butt:hover {
                background: #780206;  /* fallback for old browsers */
                background: -webkit-linear-gradient(to right, #061161, #780206);  /* Chrome 10-25, Safari 5.1-6 */
                background: linear-gradient(to right, #061161, #780206); /* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */
                font-family: Humnst777 Blk Bt;
                -webkit-transform: translate(-10px);
                transform: translate(-10px);
            }
        </style>
    </body>
</html>
